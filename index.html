<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yagi Logistics</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0a1f44,#007BFF);
  color:white;
  min-height:100vh;
}

.screen{
  display:none;
  min-height:100vh;
  padding:20px;
  flex-direction:column;
  align-items:center;
  overflow-y:auto;
}

.active{
  display:flex;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 20px;
  margin: 12px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  width: 100%;
  max-width: 420px;
}

input, select, button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  font-size: 16px;
}

button{
  background: linear-gradient(135deg, orange, #ff9500);
  font-weight: bold;
  cursor: pointer;
  border-radius: 10px;
  transition: 0.3s;
}

button:hover{
  transform: scale(1.05);
}

.delete-btn {
  background: #ff4444;
}

.stat-box {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.stat-box h3 {
  margin: 0 0 5px 0;
  font-size: 28px;
  color: #ffd700;
}

.pending { background: rgba(255,215,0,0.2); color: gold; padding: 4px 10px; border-radius: 20px; }
.transit  { background: rgba(255,165,0,0.2); color: orange; padding: 4px 10px; border-radius: 20px; }
.delivered{ background: rgba(0,255,100,0.2); color: lightgreen; padding: 4px 10px; border-radius: 20px; }

#toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #00c853;
  color: white;
  padding: 14px 20px;
  border-radius: 10px;
  display: none;
  z-index: 9999;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  font-weight: bold;
}
</style>
</head>

<body>

<div id="toast"></div>

<div class="header" style="text-align:center; margin-bottom:20px; width:100%;">
  <h1>🚚 Yagi Logistics</h1>
  <p style="opacity:0.7;">Real-Time Delivery Tracking System</p>
</div>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="card">
    <h2>Yagi <span style="color:yellow;">Logistics</span></h2>
    <button onclick="go('login')">🔐 Admin Login</button>
    <button onclick="go('customer')">📦 Track Package</button>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="login" class="screen">
  <div class="card">
    <h3>🔐 Admin Access</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Create Account</button>
    <button onclick="go('home')">⬅ Back</button>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin" class="screen">
  <h2>📊 Admin Dashboard</h2>

  <!-- Stats -->
  <div class="card">
    <h3>📊 Business Overview</h3>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
      <div class="stat-box"><h3 id="totalCount">0</h3><p>Total Parcels</p></div>
      <div class="stat-box"><h3 id="pendingCount">0</h3><p>Pending</p></div>
      <div class="stat-box"><h3 id="transitCount">0</h3><p>In Transit</p></div>
      <div class="stat-box"><h3 id="deliveredCount">0</h3><p>Delivered</p></div>
    </div>
  </div>

  <!-- Add New Parcel -->
  <div class="card">
    <h3>➕ Add New Parcel</h3>
    <input id="pid" placeholder="Tracking ID (optional)">
    <input id="pname" placeholder="Customer Name">
    <select id="pstatus">
      <option>Pending</option>
      <option>In Transit</option>
      <option>Delivered</option>
    </select>
    <button onclick="addParcel()">Create Parcel</button>
  </div>

  <!-- Search -->
  <div class="card">
    <input id="searchBox" placeholder="🔍 Search by ID or Name" oninput="render()">
  </div>

  <!-- Parcel List -->
  <div class="card">
    <h3>📦 Parcel Management</h3>
    <div id="list"></div>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<!-- CUSTOMER TRACKING -->
<div id="customer" class="screen">
  <div class="card">
    <h3>Track Your Package</h3>
    <input id="trackId" placeholder="Enter Tracking ID">
    <button onclick="track()">Track Package</button>
    <div id="result"></div>
    <button onclick="go('home')">⬅ Home</button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ==================== Firebase Config ====================
const firebaseConfig = {
  apiKey: "AIzaSyBVlxuIxDFLwVLSgPQO7KGgxYiW0IY6BDs",
  authDomain: "yagiparcel.firebaseapp.com",
  databaseURL: "https://yagiparcel-default-rtdb.firebaseio.com",
  projectId: "yagiparcel",
};

const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ==================== Variables ====================
let parcels = [];
const ADMIN_EMAIL = "helloyagi1998@gmail.com";

// ==================== Navigation ====================
function go(screen){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

// ==================== Toast ====================
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

// ==================== Auth State ====================
auth.onAuthStateChanged(user => {
  if (user) {
    if (user.email === ADMIN_EMAIL) {
      go("admin");
    } else {
      auth.signOut();
      go("home");
      showToast("Access denied. Not an admin.");
    }
  } else {
    go("home");
  }
});

// ==================== Updated Login Function ====================
function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    showToast("⚠️ Fill in all fields");
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
      const user = userCredential.user;

      if(user.email !== ADMIN_EMAIL){
        auth.signOut();
        showToast("⛔ Not authorized as admin");
        return;
      }

      showToast("✅ Welcome Admin");
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
    })
    .catch(err => {
      let msg = "Login failed";

      if(err.code === "auth/user-not-found") msg = "❌ Account not found";
      else if(err.code === "auth/wrong-password") msg = "❌ Wrong password";
      else if(err.code === "auth/invalid-email") msg = "❌ Invalid email";

      showToast(msg);
    });
}

// ==================== Updated Register Function ====================
function register(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(email !== ADMIN_EMAIL){
    showToast("⛔ Only owner can create admin");
    return;
  }

  if(!email || !password){
    showToast("⚠️ Fill all fields");
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => showToast("✅ Admin account created"))
    .catch(err => showToast("❌ " + err.message));
}

function logout(){
  auth.signOut();
  showToast("Logged out 👋");
}

// ==================== Updated Add Parcel Function ====================
function addParcel(){
  let id = document.getElementById("pid").value.trim().toUpperCase() 
           || "YAG-" + Date.now().toString().slice(-6);

  const name = document.getElementById("pname").value.trim();
  const status = document.getElementById("pstatus").value;

  if(!name) return showToast("Customer name is required");

  const now = new Date();
  const etaDate = new Date();
  etaDate.setDate(now.getDate() + 3);

  db.ref("parcels/" + id).set({
    id: id,
    name: name,
    status: status,
    createdAt: now.toLocaleString(),
    eta: etaDate.toDateString(),
    history: [
      { text: "Order Created", time: now.toLocaleString() }
    ]
  }).then(() => {
    const link = window.location.origin + window.location.pathname + "?track=" + id;
    
    showToast("📦 Parcel created! Tap to copy link");

    setTimeout(() => {
      if(confirm("Copy tracking link?")){
        navigator.clipboard.writeText(link);
      }
    }, 500);

    document.getElementById("pid").value = "";
    document.getElementById("pname").value = "";
    document.getElementById("pstatus").selectedIndex = 0;
  }).catch(err => alert("Error: " + err.message));
}

// ==================== Update Status ====================
function updateStatus(id, newStatus){
  const statusText = {
    "Pending": "Package Pending",
    "In Transit": "Package In Transit",
    "Delivered": "Package Delivered"
  };

  const now = new Date().toLocaleString();

  db.ref("parcels/" + id).once("value", snap => {
    let data = snap.val() || {};
    let history = data.history || [];

    history.push({ text: statusText[newStatus] || newStatus, time: now });

    db.ref("parcels/" + id).update({
      status: newStatus,
      history: history
    });
  });

  showToast("Status updated ✅");
}

// ==================== Delete Parcel ====================
function deleteParcel(id){
  if(confirm("Delete this parcel permanently?")){
    db.ref("parcels/" + id).remove();
    showToast("Parcel deleted");
  }
}

// ==================== Updated Render Function ====================
function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  // Show message if no parcels
  if(parcels.length === 0){
    list.innerHTML = "<p>No parcels yet 🚚</p>";
    return;
  }

  const total = parcels.length;
  const pending = parcels.filter(p => p.status === "Pending").length;
  const transit = parcels.filter(p => p.status === "In Transit").length;
  const delivered = parcels.filter(p => p.status === "Delivered").length;

  document.getElementById("totalCount").innerText = total;
  document.getElementById("pendingCount").innerText = pending;
  document.getElementById("transitCount").innerText = transit;
  document.getElementById("deliveredCount").innerText = delivered;

  const search = document.getElementById("searchBox").value.toLowerCase();

  const filtered = parcels.filter(p => 
    p.id.toLowerCase().includes(search) || 
    p.name.toLowerCase().includes(search)
  );

  if(filtered.length === 0){
    list.innerHTML = `<p class="empty-state">No parcels found.</p>`;
    return;
  }

  filtered.forEach(p => {
    const cls = p.status === "Pending" ? "pending" :
                p.status === "In Transit" ? "transit" : "delivered";

    list.innerHTML += `
      <div class="card">
        <b>${p.id}</b><br>
        ${p.name}<br><br>
        <span class="${cls}"><strong>${p.status}</strong></span><br><br>
        
        <select onchange="updateStatus('${p.id}', this.value)">
          <option ${p.status==="Pending" ? "selected" : ""}>Pending</option>
          <option ${p.status==="In Transit" ? "selected" : ""}>In Transit</option>
          <option ${p.status==="Delivered" ? "selected" : ""}>Delivered</option>
        </select>

        <button onclick="deleteParcel('${p.id}')" class="delete-btn">❌ Delete</button>
      </div>
    `;
  });
}

// ==================== Customer Track Function ====================
function track(){
  const id = document.getElementById("trackId").value.trim().toUpperCase();
  const res = document.getElementById("result");

  if(!id) return showToast("Please enter a tracking ID");

  res.innerHTML = "<p>🔄 Checking...</p>";

  db.ref("parcels/" + id).once("value")
    .then(snapshot => {
      if(snapshot.exists()){
        const p = snapshot.val();
        let timeline = "";

        if(p.history && p.history.length > 0){
          p.history.forEach(h => {
            timeline += `<p>✔ ${h.text} <small>${h.time}</small></p>`;
          });
        }

        const today = new Date();
        const eta = new Date(p.eta);
        let deliveryNote = "";

        if(p.status !== "Delivered"){
          const diff = Math.ceil((eta - today) / (1000 * 60 * 60 * 24));
          deliveryNote = diff <= 0 ? "🚚 Out for delivery today!" :
                         diff === 1 ? "📦 Arriving tomorrow" :
                         `⏳ ${diff} days remaining`;
        }

        res.innerHTML = `
          <div class="card">
            <h2>📦 ${p.id}</h2>
            <p><strong>Customer:</strong> ${p.name}</p>
            <p><strong>ETA:</strong> ${p.eta || "N/A"}</p>
            <p>${deliveryNote}</p>
            <hr>
            <h4>📍 Timeline</h4>
            <div class="timeline">${timeline || "<p>No updates yet.</p>"}</div>
            <hr>
            <p><strong>Status:</strong> 
              <span class="${p.status==="Pending"?"pending":p.status==="In Transit"?"transit":"delivered"}">
                ${p.status}
              </span>
            </p>
          </div>`;
      } else {
        res.innerHTML = `<p style="color:#ff6666; text-align:center;">❌ Parcel not found</p>`;
      }
    })
    .catch(err => res.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`);
}

// ==================== Real-time Listener ====================
db.ref("parcels").on("value", snap => {
  parcels = [];
  const data = snap.val();
  if(data){
    Object.keys(data).forEach(key => parcels.push(data[key]));
  }
  if(document.getElementById("admin").classList.contains("active")){
    render();
  }
});

// ==================== Auto Track from URL ====================
window.onload = function(){
  const params = new URLSearchParams(window.location.search);
  const trackId = params.get("track");

  if(trackId){
    go("customer");
    document.getElementById("trackId").value = trackId.toUpperCase();
    setTimeout(track, 600);
  }
};

</script>

</body>
</html>
