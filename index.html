<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yagi Logistics</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0a1f44,#007BFF);
  color:white;
}

.screen{
  display:none;
  min-height:100vh;
  padding:20px;
  flex-direction:column;
  align-items:center;
  overflow-y:auto;
}

.active{
  display:flex;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 20px;
  margin: 12px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
  width: 100%;
  max-width: 420px;
}

.card:hover{
  transform: translateY(-3px);
}

input,select,button{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  font-size: 16px;
}

button{
  background: linear-gradient(135deg, orange, #ff9500);
  font-weight: bold;
  cursor: pointer;
  border-radius: 10px;
  transition: 0.3s;
}

button:hover{
  transform: scale(1.05);
}

.delete-btn {
  background: #ff4444;
  color: white;
  margin-top: 10px;
}

.stat-box {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.stat-box h3 {
  margin: 0 0 5px 0;
  font-size: 28px;
  color: #ffd700;
}

.stat-box p {
  margin: 0;
  opacity: 0.8;
  font-size: 14px;
}

h2 span{
  color:yellow;
}

hr{
  border:0;
  border-top:1px solid rgba(255,255,255,0.2);
  margin:10px 0;
}

.pending{
  background: rgba(255,215,0,0.2);
  color: gold;
  padding: 4px 10px;
  border-radius: 20px;
}

.transit{
  background: rgba(255,165,0,0.2);
  color: orange;
  padding: 4px 10px;
  border-radius: 20px;
}

.delivered{
  background: rgba(0,255,100,0.2);
  color: lightgreen;
  padding: 4px 10px;
  border-radius: 20px;
}

.empty-state {
  color: rgba(255,255,255,0.6);
  font-style: italic;
  padding: 20px 0;
}

.header {
  text-align: center;
  margin-bottom: 20px;
  width: 100%;
}

.timeline p {
  margin: 8px 0;
  padding-left: 10px;
  border-left: 3px solid #ff9500;
}

.timeline small {
  color: rgba(255,255,255,0.7);
  font-size: 0.85em;
}

/* Toast Notification */
#toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #00c853;
  color: white;
  padding: 14px 20px;
  border-radius: 10px;
  display: none;
  z-index: 9999;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  font-weight: bold;
}
</style>
</head>

<body>

<!-- Toast Notification -->
<div id="toast"></div>

<div class="header">
  <h1>🚚 Yagi Logistics</h1>
  <p style="opacity:0.7; margin:5px 0 0 0;">Real-Time Delivery Tracking System</p>
</div>

<div id="home" class="screen active">
  <h2>Yagi <span>Logistics</span></h2>
  <div class="card">
    <button onclick="go('login')">Admin Login</button>
    <button onclick="go('customer')">Track Package</button>
  </div>
</div>

<div id="login" class="screen">
  <div class="card">
    <h3>🔐 Admin Access</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Create Account</button>
    <button onclick="go('home')">⬅ Back</button>
  </div>
</div>

<div id="admin" class="screen">
  <h2>📊 Admin Dashboard</h2>

  <!-- Business Overview -->
  <div class="card">
    <h3>📊 Business Overview</h3>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
      <div class="stat-box">
        <h3 id="totalCount">0</h3>
        <p>Total Parcels</p>
      </div>
      <div class="stat-box">
        <h3 id="pendingCount">0</h3>
        <p>Pending</p>
      </div>
      <div class="stat-box">
        <h3 id="transitCount">0</h3>
        <p>In Transit</p>
      </div>
      <div class="stat-box">
        <h3 id="deliveredCount">0</h3>
        <p>Delivered</p>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>➕ Add New Parcel</h3>
    <input id="pid" placeholder="Tracking ID (optional)">
    <input id="pname" placeholder="Customer Name">
    
    <select id="pstatus">
      <option>Pending</option>
      <option>In Transit</option>
      <option>Delivered</option>
    </select>

    <button onclick="addParcel()">Create Parcel</button>
  </div>

  <div class="card">
    <input id="searchBox" placeholder="🔍 Search by ID or Name" oninput="render()">
  </div>

  <div class="card">
    <h3>📦 Parcel Management</h3>
    <div id="list"></div>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<div id="customer" class="screen">
  <div class="card">
    <h3>Track Parcel</h3>
    <input id="trackId" placeholder="Tracking ID">
    <button onclick="track()">Track</button>
    <p id="result"></p>
    <button onclick="go('home')">⬅ Home</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
// ==================== Firebase Config ====================
var firebaseConfig = {
  apiKey: "AIzaSyBVlxuIxDFLwVLSgPQO7KGgxYiW0IY6BDs",
  authDomain: "yagiparcel.firebaseapp.com",
  databaseURL: "https://yagiparcel-default-rtdb.firebaseio.com",
  projectId: "yagiparcel",
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ==================== Global Variables ====================
let parcels = [];
const ADMIN_EMAIL = "helloyagi1998@email.com";

// ==================== Navigation ====================
function go(screen){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

// ==================== Toast Function ====================
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

// ==================== Auth State Listener ====================
firebase.auth().onAuthStateChanged(user => {
  if(user){
    go("admin");
  } else {
    go("home");
  }
});

// ==================== Login ====================
function login(){
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value;

  if(!email || !password){
    showToast("Please fill all fields ❌");
    return;
  }

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then((userCred) => {
      // Temporary debug logs
      console.log("Firebase email:", userCred.user.email);
      console.log("Admin email:", ADMIN_EMAIL);

      go("admin");
      showToast("Login successful ✅");

      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
    })
    .catch(err => {
      alert("Login failed: " + err.message);
    });
}

// ==================== Register ====================
function register(){
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value;

  if(!email || !password){
    showToast("Please fill all fields ❌");
    return;
  }

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(() => {
      showToast("Account created successfully 🎉");
    })
    .catch(err => {
      alert("Registration failed: " + err.message);
    });
}

// ==================== Logout ====================
function logout(){
  firebase.auth().signOut();
  showToast("Logged out 👋");
}

// ==================== Add New Parcel ====================
function addParcel(){
  let id = document.getElementById("pid").value.trim().toUpperCase() 
           || "YAG" + Math.floor(100000 + Math.random()*900000);

  let name = document.getElementById("pname").value.trim();
  let status = document.getElementById("pstatus").value;

  if(!name){
    showToast("Customer name required ❌");
    return;
  }

  let now = new Date();
  let etaDate = new Date();
  etaDate.setDate(now.getDate() + 3);

  db.ref("parcels/"+id).set({
    id,
    name,
    status,
    createdAt: now.toLocaleString(),
    eta: etaDate.toDateString(),
    history: [
      { text: "Order Created", time: now.toLocaleString() }
    ]
  }).then(() => {
    const link = window.location.origin + window.location.pathname + "?track=" + id;
    
    navigator.clipboard.writeText(link).catch(() => {});

    showToast("✅ Parcel Created Successfully!");

    document.getElementById("pid").value = "";
    document.getElementById("pname").value = "";
    document.getElementById("pstatus").selectedIndex = 0;
    document.getElementById("pid").focus();
  }).catch((error) => {
    alert("Error creating parcel: " + error.message);
  });
}

// ==================== Update Status ====================
function updateStatus(id, newStatus){
  let statusText = {
    "Pending": "Package Pending",
    "In Transit": "Package In Transit",
    "Delivered": "Package Delivered"
  };

  let now = new Date().toLocaleString();

  db.ref("parcels/" + id).once("value", snap => {
    let data = snap.val();
    let history = data.history || [];

    history.push({
      text: statusText[newStatus],
      time: now
    });

    db.ref("parcels/" + id).update({
      status: newStatus,
      history: history
    });
  });

  showToast("Status updated ✅");
}

// ==================== Delete Parcel ====================
function deleteParcel(id){
  if(confirm("Delete this parcel?")){
    db.ref("parcels/" + id).remove();
    showToast("Parcel deleted");
  }
}

// ==================== Render Parcels ====================
function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = parcels.length;
  let pending = parcels.filter(p => p.status === "Pending").length;
  let transit = parcels.filter(p => p.status === "In Transit").length;
  let delivered = parcels.filter(p => p.status === "Delivered").length;

  document.getElementById("totalCount").innerText = total;
  document.getElementById("pendingCount").innerText = pending;
  document.getElementById("transitCount").innerText = transit;
  document.getElementById("deliveredCount").innerText = delivered;

  let search = document.getElementById("searchBox")?.value?.toLowerCase() || "";

  let filteredParcels = parcels.filter(p => 
    p.id.toLowerCase().includes(search) || 
    p.name.toLowerCase().includes(search)
  );

  if(filteredParcels.length === 0){
    list.innerHTML = `<p class="empty-state">No parcels found matching your search.</p>`;
    return;
  }

  filteredParcels.forEach(p => {
    let cls = p.status === "Pending" ? "pending" :
              p.status === "In Transit" ? "transit" : "delivered";

    list.innerHTML += `
      <div class="card">
        <b>${p.id}</b><br>
        ${p.name}<br><br>
        <span class="${cls}"><strong>${p.status}</strong></span><br><br>
        
        <select onchange="updateStatus('${p.id}', this.value)">
          <option ${p.status==="Pending" ? "selected" : ""}>Pending</option>
          <option ${p.status==="In Transit" ? "selected" : ""}>In Transit</option>
          <option ${p.status==="Delivered" ? "selected" : ""}>Delivered</option>
        </select>

        <button onclick="deleteParcel('${p.id}')" class="delete-btn">❌ Delete</button>
      </div>
    `;
  });
}

// ==================== Track Parcel ====================
function track(){
  let id = document.getElementById("trackId").value.trim().toUpperCase();
  let res = document.getElementById("result");

  res.innerHTML = "<p>🔄 Checking parcel...</p>";

  let f = parcels.find(p => p.id === id);

  if(f){
    let timeline = f.history ? f.history.map(h => 
      `<p>✔ ${h.text} <br><small>${h.time}</small></p>`
    ).join('') : "<p>No timeline available yet.</p>";

    let today = new Date();
    let eta = new Date(f.eta);
    let deliveryNote = "";

    if(f.status !== "Delivered"){
      let diff = Math.ceil((eta - today) / (1000 * 60 * 60 * 24));
      if(diff <= 0) deliveryNote = "🚚 Out for delivery today!";
      else if(diff === 1) deliveryNote = "📦 Arriving tomorrow";
      else deliveryNote = `⏳ ${diff} days remaining`;
    }

    res.innerHTML = `
      <div class="card">
        <h2>📦 ${f.id}</h2>
        <p><strong>Customer:</strong> ${f.name}</p>
        <p><strong>📅 Estimated Delivery:</strong> ${f.eta || "Calculating..."}</p>
        <p>${deliveryNote}</p>
        <hr>
        <h4>📍 Delivery Timeline</h4>
        <div class="timeline">${timeline}</div>
        <hr>
        <p><strong>Current Status:</strong> 
          <span class="${f.status==="Pending"?"pending": f.status==="In Transit"?"transit":"delivered"}">
            ${f.status}
          </span>
        </p>
      </div>
    `;
  } else {
    res.innerHTML = `<p style="color:#ff6666; text-align:center; padding:15px;">
      ❌ No parcel found with Tracking ID: <strong>${id}</strong>
    </p>`;
  }
}

// ==================== Firebase Real-time Listener ====================
db.ref("parcels").on("value", snap => {
  parcels = [];
  let data = snap.val();
  if(data){
    Object.keys(data).forEach(k => parcels.push(data[k]));
  }
  render();
});

// ==================== Auto Track from URL ====================
window.onload = function(){
  let params = new URLSearchParams(window.location.search);
  let trackId = params.get("track");

  if(trackId){
    go("customer");
    document.getElementById("trackId").value = trackId.toUpperCase();
    setTimeout(track, 800);
  }
};

</script>

</body>
</html>
